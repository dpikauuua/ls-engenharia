<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LS Engenharia – Vale Digital</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --amarelo: #F5A800;
    --laranja: #E07800;
    --escuro: #1A1A2E;
    --cinza: #2E2E4A;
    --branco: #F8F8F8;
  }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--escuro);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(245,168,0,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 50%, rgba(224,120,0,0.06) 0%, transparent 60%);
  }
  .bg-pattern {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(245,168,0,0.02) 40px,
      rgba(245,168,0,0.02) 41px
    );
  }
  .card {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(245,168,0,0.2);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
  }
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, var(--amarelo), var(--laranja));
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 16px;
    box-shadow: 0 8px 30px rgba(245,168,0,0.3);
  }
  .logo-area h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--branco);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo-area p {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .flash {
    background: rgba(220,50,50,0.15);
    border: 1px solid rgba(220,50,50,0.4);
    color: #ff8080;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 14px;
    text-align: center;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--branco);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    margin-bottom: 20px;
    transition: all 0.2s;
    outline: none;
  }
  input:focus {
    border-color: var(--amarelo);
    background: rgba(245,168,0,0.06);
    box-shadow: 0 0 0 3px rgba(245,168,0,0.1);
  }
  input::placeholder { color: rgba(255,255,255,0.2); }
  button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--amarelo), var(--laranja));
    border: none;
    border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--escuro);
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(245,168,0,0.3);
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(245,168,0,0.4);
  }
  .footer-text {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="card">
  <div class="logo-area">
    <div class="logo-icon">🏗️</div>
    <h1>LS Engenharia</h1>
    <p>Vale Digital</p>
  </div>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}
  <form method="POST" action="/login">
    <label>CPF</label>
    <input type="text" name="cpf" placeholder="000.000.000-00" required maxlength="14">
    <label>Senha</label>
    <input type="password" name="senha" placeholder="••••••••" required>
    <button type="submit">Entrar →</button>
  </form>
  <div class="footer-text">LS Soluções em Engenharia © 2024</div>
</div>
</body>
</html>
